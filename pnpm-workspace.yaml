packages:
  - examples
  - packages/**

allowBuilds:
  esbuild: false

# 重複排除
dedupePeers: true

catalog:
  aws-amplify: 6.18.0
  jsdom: 29.1.1
  playwright: 1.61.1
  qrcode.react: 4.2.0
  react: &react_ver 19.2.7
  react-dom: *react_ver
  rolldown: 1.2.0
  rolldown-plugin-dts: 0.27.9
  storybook: &storybook_ver 10.5.0
  turbo: 2.10.5
  typescript: 7.0.2
  vite: 8.1.4
  vitest: &vitest_ver 4.1.10
  xstate: 5.32.5
  '@aws-amplify/auth': 6.20.0
  '@aws-amplify/core': 6.16.4
  '@biomejs/biome': 2.5.4
  '@fast-check/vitest': 0.4.1
  '@storybook/addon-docs': *storybook_ver
  '@storybook/addon-links': *storybook_ver
  '@storybook/addon-vitest': *storybook_ver
  '@storybook/react-vite': *storybook_ver
  '@types/node': 26.1.1
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-react': 6.0.3
  '@testing-library/react': 16.3.2
  '@vitest/browser': *vitest_ver
  '@vitest/coverage-v8': *vitest_ver
  '@vitest/expect': *vitest_ver
  '@vitest/mocker': *vitest_ver
  '@vitest/spy': *vitest_ver
  '@xstate/react': 6.1.0

overrides:
  esbuild: '>=0.28.1'
  fast-xml-parser: '>=5.10.1'
  '@vitest/expect': 'catalog:'
  '@vitest/mocker': 'catalog:'
  '@vitest/spy': 'catalog:'

# リリースから一定時間経過していないか、信頼性低下したパッケージはインストールしない
minimumReleaseAge: 2880 # 2d
minimumReleaseAgeIgnoreMissingTime: false
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'semver@6.3.1'

# 特殊なソースからの依存関係をインストールしない
blockExoticSubdeps: true
